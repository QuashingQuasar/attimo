<svg width="600" height="600" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <pattern id="greekMotifs" x="0" y="0" width="600" height="600" patternUnits="userSpaceOnUse">
      
      <!-- Top row -->
      <image href="/assets/motifs/amphora.svg" x="50" y="50" width="80" height="80" opacity="0.4"/>
      <image href="/assets/motifs/lyre.svg" x="250" y="30" width="100" height="100" opacity="0.35"/>
      <image href="/assets/motifs/basket.svg" x="480" y="60" width="70" height="70" opacity="0.4"/>
      
      <!-- Middle row -->
      <image href="/assets/motifs/olive-branch.svg" x="20" y="200" width="90" height="90" opacity="0.3"/>
      <image href="/assets/motifs/column.svg" x="180" y="180" width="60" height="120" opacity="0.35"/>
      <image href="/assets/motifs/lady.svg" x="320" y="220" width="100" height="100" opacity="0.3"/>
      <image href="/assets/motifs/sun.svg" x="500" y="230" width="70" height="70" opacity="0.4"/>
      
      <!-- Bottom row -->
      <image href="/assets/motifs/bread.svg" x="80" y="400" width="80" height="80" opacity="0.35"/>
      <image href="/assets/motifs/caraf.svg" x="240" y="420" width="70" height="70" opacity="0.4"/>
      <image href="/assets/motifs/book.svg" x="390" y="410" width="90" height="90" opacity="0.3"/>
      
      <!-- Scattered accents -->
      <image href="/assets/motifs/mortar.svg" x="450" y="350" width="50" height="50" opacity="0.25"/>
      <image href="/assets/motifs/branch.svg" x="140" y="340" width="60" height="60" opacity="0.3"/>
      
    </pattern>
