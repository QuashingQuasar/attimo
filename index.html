<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Mediterranean Olive Oil | Ancient Groves Collection</title>
    <meta name="description" content="Discover liquid gold from 500-year-old olive trees. Premium extra virgin olive oil crafted using traditional methods. Join our waitlist for early access to Mediterranean heritage." />
    <meta name="author" content="Ancient Groves" />

    <meta property="og:title" content="6d58e4d2-f58a-4be4-9573-b0db85d115b7" />
    <meta property="og:description" content="Lovable Generated Project" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caladea:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <script>
(() => {
  // ——— Config ———
  const SF_GQL_DOMAIN = "attimo-oil.myshopify.com";       // Storefront GraphQL host (keep myshopify for API)
  const CART_BASE      = "https://shop.attimo-oil.com";    // Where cart/checkout live (your subdomain)
  const SF_TOKEN       = "79b950607019e5b5574dd3e5fe0fe15a";

  // ——— GQL helper ———
  async function sfGQL(query, variables = {}) {
    const res = await fetch(`https://${SF_GQL_DOMAIN}/api/2025-01/graphql.json`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Shopify-Storefront-Access-Token": SF_TOKEN
      },
      body: JSON.stringify({ query, variables }),
      credentials: "omit"
    });
    const data = await res.json();
    if (data.errors) console.error("[attimo] GQL errors:", data.errors);
    return data.data;
  }

  // ——— Badge update ———
  async function updateCartBadge() {
    const badge = document.querySelector('#cart-badge');
    if (!badge) return;

    try {
      const res = await fetch(`${CART_BASE}/cart.js`, {
        credentials: 'include',
        cache: 'no-store'
      });
      if (!res.ok) throw new Error('cart.js failed');
      const cart = await res.json();
      const count = Number(cart.item_count) || 0;
      badge.textContent = count > 0 ? String(count) : '';
      badge.classList.toggle('hidden', count <= 0);
    } catch (e) {
      // swallow; keep previous badge state
    }
  }

  // ——— Force nav cart link to /cart and block any rogue handlers ———
  function forceCartLink() {
    const a = document.querySelector("#nav-cart-link");
    if (!a) return;
    a.href   = `${CART_BASE}/cart`;
    a.target = "_self";

    // capture-phase handler to trump any downstream listener that tries /checkout
    const forceCart = (e) => {
      e.preventDefault();
      e.stopImmediatePropagation();
      e.stopPropagation();
      window.location.href = a.href;  // always /cart
    };
    a.addEventListener("click", forceCart, true);
  }

 // ——— CTA wiring ———
  function wireCTA() {
    const cta = document.querySelector("#add-to-cart-btn");
    if (!cta) return;
    cta.addEventListener("click", async (e) => {
      e.preventDefault();
      const active = document.querySelector("[data-variant].active");
      const merchandiseId = active?.dataset?.variant;
      if (!merchandiseId) return console.warn("[attimo] no active pill / variant");

      try {
        const m = `
          mutation AddLine($lines:[CartLineInput!]!) {
            cartCreate(input:{ lines:$lines }) { cart { id totalQuantity } }
          }
        `;
        await sfGQL(m, { lines: [{ merchandiseId, quantity: 1 }] });
        const txt = cta.textContent;
        cta.textContent = "Added!";
        setTimeout(() => (cta.textContent = txt || "Add to cart"), 1200);
        document.dispatchEvent(new Event('attimo:added'));
        updateCartBadge();
      } catch (err) {
        console.error("[attimo] add-to-cart failed", err);
      }
    }, { once: false });
  }

  document.addEventListener("DOMContentLoaded", () => {
    forceCartLink();     // ensure the icon goes to /cart on shop.attimo-oil.com
    wireCTA();           // hook the add-to-cart
    updateCartBadge();   // populate badge on load

    // Refresh badge when tab regains focus (catches changes made on cart page)
    window.addEventListener('focus', updateCartBadge);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) updateCartBadge();
    });

    // Listen for custom event fired after add-to-cart
    document.addEventListener('attimo:added', updateCartBadge);
  });
})();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="/js/attimo-wire-cart-link.js"></script>
  </body>
</html>
